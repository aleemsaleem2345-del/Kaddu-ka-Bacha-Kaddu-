<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaddu Ka Bacha Kaddu 🥰</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#ffeecf);
    color:#333;
}

section{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
}

/* Hero Section */

.hero{
    background:linear-gradient(135deg,#ff8fb1,#ffc3a0);
    color:white;
}

.hero h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
}

.arrow{
    margin-top:50px;
    font-size:45px;
    animation:float 1.5s infinite;
}

@keyframes float{
    50%{
        transform:translateY(10px);
    }
}

/* Message Section */

.message{
    background:#fffafc;
}

.card{
    max-width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card h2{
    color:#ff4f87;
    font-size:42px;
    margin-bottom:20px;
}

.card p{
    font-size:24px;
    line-height:1.8;
}
</style>
</head>

<body>

<section class="hero">
    <h1>🥰 Kaddu Ka Bacha Kaddu 🥰</h1>
    <p>Scroll Down ❤️</p>
    <div class="arrow">⬇️</div>
</section>

<section class="message">
    <div class="card">
        <h2>🌞 Good Morning Meri Jaan ❤️</h2>

        <p>
            Mera bacha uth gaya? 🥹❤️<br><br>

            Good Morning meri jaan. ☀️💖<br><br>

            Allah tumhe hamesha khush rakhe aur tumhari har subah pyaari muskurahat ke saath shuru ho. 🥰💕
        </p>
    </div>
</section>

</body>
</html>
